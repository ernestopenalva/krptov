token_scanner:
  chain_ids:
    - ethereum
    - base

  watchlist_max_tokens: 10
  watchlist_infinite: true

  feed_disappearance_minutes: 60

  discard_retention_hours: 168

  cycle_interval_seconds: 60

social_inference:
  enabled: true
  scoring_mode: "origin_reputation"
  disable_post_metric_alerts: true
  require_social_eligibility: "eligible"
  require_numeric_market_score: true
  monitoring_window_hours: 22
  max_posts_per_token: 8
  cycle_interval_seconds: 180
  max_new_tokens_per_day: 30
  max_tokens_per_cycle: 30
  max_new_tokens_per_cycle: 10
  prioritize_market_score: true

  excluded_author_usernames:
    - dexsignals

  followers_alert_threshold: 2000

  badges:
    alert_on_affiliation: true
    alert_on_verified_business: true
    alert_on_verified_government: true
    ignore_blue_as_alert: true

  automation:
    enabled: true
    detect_operator: true
    analyze_operator_profile: true
    operator_patterns:
      - "automatizado por @"
      - "automated by @"
      - "bot by @"

  author_followers_thresholds:
    medium: 2000
    high: 20000
    critical: 100000

telegram_alerts:
  enabled: true
  dry_run: false
  parse_mode: "HTML"
  timeout_seconds: 20

ops_alerts:
  enabled: true
  cooldown_seconds: 1800

market_ranker:
  score_weights:
    quote_liquidity: 5
    volume_h24: 3
    txns_h24: 4
    minimum_token_age_inferred: 5

  social_eligibility:
    max_pool_age_minutes: 1440

  market_sanity:
    misleading_liquidity_usd_threshold: 100000
    misleading_quote_liquidity_usd_threshold: 1000
    misleading_score_multiplier: 0.25

  watchlist_retention:
    enabled: true
    max_entries: 500
    archive_removed: true
    archive_file: "data/watchlist_archive.jsonl"
    unranked_retention_hours: 6
    pending_retention_hours: 12
    blocked_old_market_retention_hours: 6
    low_score_retention_hours: 24
    low_score_threshold: 35
